<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>LogiTrack</h1>
    <canvas id="iconCanvas" width="192" height="192"></canvas>
    <br>
    <button onclick="generateIcon()">Generate 192x192 Icon</button>
    <button onclick="generateIcon512()">Generate 512x512 Icon</button>

    <script>
        // Helper function to draw rounded rectangles (compatible with all browsers)
        function drawRoundedRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        function generateIcon() {
            const canvas = document.getElementById('iconCanvas');

            // Check if canvas is supported
            if (!canvas || !canvas.getContext) {
                alert('Canvas is not supported in this browser');
                return;
            }

            const ctx = canvas.getContext('2d');
            if (!ctx) {
                alert('Unable to get canvas context');
                return;
            }

            // Show canvas temporarily
            canvas.classList.add('visible');

            // Create gradient background
            const gradient = ctx.createLinearGradient(0, 0, 192, 192);
            gradient.addColorStop(0, '#2563eb');
            gradient.addColorStop(1, '#1d4ed8');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 192, 192);

            // Add rounded corners
            const cornerRadius = 24;
            ctx.globalCompositeOperation = 'destination-in';
            drawRoundedRect(ctx, 0, 0, 192, 192, cornerRadius);
            ctx.fill();

            ctx.globalCompositeOperation = 'source-over';

            // Add truck icon (simplified)
            ctx.fillStyle = 'white';
            ctx.font = '120px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🚛', 96, 120);

            // Download the image
            canvas.toBlob((blob) => {
                if (!blob) {
                    alert('Error: Failed to generate image');
                    canvas.classList.remove('visible');
                    return;
                }

                try {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'icon-192x192.png';
                    a.click();
                    URL.revokeObjectURL(url);

                    // Hide canvas after successful generation
                    setTimeout(() => {
                        canvas.classList.remove('visible');
                    }, 1000);
                } catch (error) {
                    alert('Error downloading image: ' + error.message);
                    canvas.classList.remove('visible');
                }
            });
        }

        function generateIcon512() {
            // Check if canvas is supported
            const testCanvas = document.createElement('canvas');
            if (!testCanvas.getContext) {
                alert('Canvas is not supported in this browser');
                return;
            }

            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            if (!ctx) {
                alert('Unable to get canvas context');
                return;
            }

            // Create gradient background
            const gradient = ctx.createLinearGradient(0, 0, 512, 512);
            gradient.addColorStop(0, '#2563eb');
            gradient.addColorStop(1, '#1d4ed8');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 512, 512);

            // Add rounded corners
            const cornerRadius = 64;
            ctx.globalCompositeOperation = 'destination-in';
            drawRoundedRect(ctx, 0, 0, 512, 512, cornerRadius);
            ctx.fill();

            ctx.globalCompositeOperation = 'source-over';

            // Add truck icon (simplified)
            ctx.fillStyle = 'white';
            ctx.font = '300px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🚛', 256, 320);

            // Download the image
            canvas.toBlob((blob) => {
                if (!blob) {
                    alert('Error: Failed to generate 512x512 image');
                    return;
                }

                try {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'icon-512x512.png';
                    a.click();
                    URL.revokeObjectURL(url);
                } catch (error) {
                    alert('Error downloading 512x512 image: ' + error.message);
                }
            });
        }
    </script>
</body>
</html>
